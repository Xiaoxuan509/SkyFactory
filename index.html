<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF4 伺服器監控與樹苗清單</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00ff9d;
            --off: #ff4d4d;
            --text: #e0e0e0;
            --secondary: #4a4a4a;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 { color: var(--accent); margin-bottom: 5px; }
        
        /* 伺服器狀態標籤 */
        .server-status {
            background: #252525;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid var(--secondary);
            font-weight: bold;
        }
        .status-light {
            width: 10px; height: 10px; border-radius: 50%;
            margin-right: 10px; background: #555;
            box-shadow: 0 0 5px #000;
        }
        .online .status-light { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .offline .status-light { background: var(--off); box-shadow: 0 0 10px var(--off); }

        /* 搜尋框 */
        #searchBar {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 25px;
            border: 1px solid var(--secondary);
            background: var(--card-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        #searchBar:focus { border-color: var(--accent); }

        /* 清單樣式 */
        .sapling-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .sapling-item {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border-left: 4px solid var(--secondary);
        }
        .sapling-item:hover { transform: translateX(5px); background: #252525; border-left-color: var(--accent); }
        .eng-name { font-weight: bold; color: #fff; }
        .chi-name { color: #888; font-size: 0.9rem; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; transition: 0.5s; }
        .online .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .offline .dot { background: var(--secondary); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>SkyFactory 4</h1>
        <div id="statusBadge" class="server-status">
            <div class="status-light"></div>
            <span id="statusText">正在偵測伺服器...</span>
        </div>
    </div>

    <input type="text" id="searchBar" placeholder="搜尋樹苗名稱..." onkeyup="filterList()">

    <div class="sapling-list" id="saplingList"></div>
</div>

<script>
    const serverIP = "26.21.159.20"; // ⬅️ 請改為你的 Radmin IP
    const saplings = [
        ["Dirt Sapling", "泥土樹苗"], ["Petrified Sapling", "石化樹苗"],
        ["Clay Sapling", "黏土樹苗"], ["Bone Sapling", "骨頭樹苗"],
        ["Gravel Sapling", "礫石樹苗"], ["Sand Sapling", "沙子樹苗"],
        ["Coal Sapling", "煤炭樹苗"], ["Cottonwood Sapling", "棉木樹苗"],
        ["Iron Sapling", "鐵樹苗"], ["Tin Sapling", "錫樹苗"],
        ["Lead Sapling", "鉛樹苗"], ["Nickel Sapling", "鎳樹苗"],
        ["Gold Sapling", "金樹苗"], ["Redstone Sapling", "紅石樹苗"],
        ["Lapis Sapling", "青金石樹苗"], ["Copper Sapling", "銅樹苗"],
        ["Silver Sapling", "銀樹苗"], ["Diamond Sapling", "鑽石樹苗"],
        ["Emerald Sapling", "綠寶石樹苗"], ["Quartz Sapling", "石英樹苗"],
        ["Netherrack Sapling", "地獄石樹苗"], ["Glowstone Sapling", "螢石樹苗"]
    ];

    // 初始化清單
    const listContainer = document.getElementById('saplingList');
    saplings.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sapling-item';
        div.innerHTML = `
            <div>
                <div class="eng-name">${s[0]}</div>
                <div class="chi-name">${s[1]}</div>
            </div>
            <div class="dot"></div>
        `;
        listContainer.appendChild(div);
    });

    // 伺服器狀態偵測邏輯
    function checkServer() {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');
        const container = document.getElementById('mainContainer');

        const img = new Image();
        img.src = `http://${serverIP}:25565?t=${new Date().getTime()}`; // 加上時間戳防止快取
        
        const timeout = setTimeout(() => {
            badge.className = "server-status offline";
            text.innerText = "OFFLINE (伺服器關閉中)";
            container.className = "container offline";
        }, 2000);

        img.onerror = () => {
            clearTimeout(timeout);
            badge.className = "server-status online";
            text.innerText = "ONLINE (伺服器運作中)";
            container.className = "container online";
        };
    }

    function filterList() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const items = document.getElementsByClassName('sapling-item');
        Array.from(items).forEach(item => {
            item.classList.toggle('hidden', !item.innerText.toLowerCase().includes(input));
        });
    }

    // 設定定時檢查
    setInterval(checkServer, 10000);
    window.onload = checkServer;
</script>

</body>
</html>
